<hr>
<div class="container">
    <section class="users">
        @for (user of arrayPromises(); track user._id) {
        <app-user-card [user]="user" (deleteEmit)="deleteUser($event)"></app-user-card>
        }
    </section>
    <div class="d-flex justify-content-between py-2">
        <button class="btn btn-warning" (click)="gotoPrev()">ANTERIOR</button>
        <button class="btn btn-warning" (click)="gotoNext()">SIGUIENTE</button>
    </div>
</div>
