@if (user()) {
     <h2>{{ user()?.first_name }} {{ user()?.last_name }}</h2>
    <div class="container mt-5">
        <div class="row align-items-center">

            <div class="col-4 text-center">
                <img [src]="user()?.image" style="width: 250px; height: 250px; object-fit: cover;"  alt="">
            </div>
        </div>

        <div class="col-8">
            <h2>{{ user()?.first_name }} {{ user()?.last_name }}</h2>

            <p><strong>Nombre Usuario: </strong>{{ user()?.first_name }}</p>
            <p><strong>Apellido: </strong>{{ user()?.last_name }}</p>
            <p><strong>Email: </strong>{{ user()?.email }}</p>

            <div class="mt-4">
                <button class="btn btn-danger me-2" (click)="deleteUser(user()?._id)">Eliminar</button>
                <button class="btn btn-warning me-2" [routerLink]="['/updateuser', user()?._id]" >Actualizar</button>
                <button class="btn btn-secondary" [routerLink]="['/home']" >Volver a listado</button>
            </div>

        </div>


    </div>
}
